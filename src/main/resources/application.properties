server.port=${PORT:8080}

# --- Mail (Gmail SMTP) ---
# MAIL_USERNAME = your Gmail address
# MAIL_PASSWORD = a Gmail "App Password" (NOT your normal Gmail password)
# Generate one at: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- App-specific settings ---
# Where the contact form notification email should be sent
app.mail.owner-address=${OWNER_EMAIL}

# Comma-separated list of frontend origins allowed to call this API
# Example: http://localhost:4200,https://santhoshkumar-dev-portfolio.netlify.app
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}
